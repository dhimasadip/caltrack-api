services:
  api:
    build:
      context: .
      target: development
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: 3000
      LOG_LEVEL: info
      DATABASE_URL: postgres://caltrack:caltrack@postgres:5432/caltrack
      REDIS_URL: redis://redis:6379
      JWT_SECRET: local-development-jwt-secret-change-me
      TOKEN_HASH_SECRET: local-development-token-hash-secret
    ports:
      - '3000:3000'
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: caltrack
      POSTGRES_USER: caltrack
      POSTGRES_PASSWORD: caltrack
    ports:
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U caltrack -d caltrack']
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8-alpine
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  api_node_modules:
  postgres_data:
  redis_data:
